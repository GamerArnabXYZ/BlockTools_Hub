name: BlockTools Hub Build & Deploy

on:
  push:
    tags:
      - 'v*' # Tags like v1.0.0 par release banega
    branches:
      - main
      - master

permissions:
  contents: write

jobs:
  # Android Job: APK builds aur Release handle karega
  build_android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Build Universal APK
        run: flutter build apk --release

      - name: Build Split APKs (per-abi)
        run: flutter build apk --release --split-per-abi

      - name: Prepare APKs for upload
        run: |
          mkdir -p release_apks
          cp build/app/outputs/flutter-apk/app-release.apk release_apks/BlockToolsHub-Universal.apk
          cp build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk release_apks/BlockToolsHub-armv7.apk || true
          cp build/app/outputs/flutter-apk/app-arm64-v8a-release.apk release_apks/BlockToolsHub-arm64.apk || true
          cp build/app/outputs/flutter-apk/app-x86_64-release.apk release_apks/BlockToolsHub-x64.apk || true

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          files: release_apks/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Artifacts (Internal)
        uses: actions/upload-artifact@v4
        with:
          name: android-apks
          path: release_apks/*.apk

  # Web Job: Deploy to GitHub Pages
  build_web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Build Web (HTML Renderer)
        run: flutter build web --web-renderer html --release --base-href "/${{ github.event.repository.name }}/"

      - name: Deploy to GitHub Pages
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build/web
