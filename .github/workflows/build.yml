name: BlockTools Hub Build & Continuous Release

on:
  push:
    branches:
      - main
      - master

permissions:
  contents: write

jobs:
  # Android Job: APK builds aur Automatic Pre-release
  build_android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Build All APKs (Universal + Split)
        # --split-per-abi ke saath ek saath universal bhi generate hota hai
        run: flutter build apk --release --split-per-abi

      - name: Prepare APKs for upload
        run: |
          mkdir -p release_apks
          # Universal APK (usually app-release.apk but sometimes needs rename)
          cp build/app/outputs/flutter-apk/app-release.apk release_apks/BlockToolsHub-Universal.apk || cp build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk release_apks/BlockToolsHub-Universal.apk
          cp build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk release_apks/BlockToolsHub-armv7.apk || true
          cp build/app/outputs/flutter-apk/app-arm64-v8a-release.apk release_apks/BlockToolsHub-arm64.apk || true
          cp build/app/outputs/flutter-apk/app-x86_64-release.apk release_apks/BlockToolsHub-x64.apk || true

      - name: Continuous Pre-release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: "latest-build"
          name: "Pre-release (Continuous Build)"
          prerelease: true
          files: release_apks/*.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Web Job: Deploy to GitHub Pages
  build_web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Build Web (HTML Renderer - No WebGL)
        # Performance ke liye CanvasKit disable kiya hai explicitly
        run: flutter build web --web-renderer html --release --base-href "/${{ github.event.repository.name }}/"

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build/web
